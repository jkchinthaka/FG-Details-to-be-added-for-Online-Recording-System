# Render Blueprint — Nelna FG Digital Recording System (API)
# Secrets are configured in the Render Dashboard — never commit real values here.
# Root directory must remain the monorepo root (workspace packages required).

services:
  - type: web
    name: nelna-fg-api
    runtime: node
    plan: starter
    region: singapore
    # Monorepo: do NOT set rootDir to apps/api
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @nelna/shared build && pnpm --filter @nelna/api prisma:generate && pnpm --filter @nelna/api build
    startCommand: pnpm --filter @nelna/api start:prod
    healthCheckPath: /health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: NELNA_DEPLOY_TIER
        value: production
      - key: API_CORS_ORIGIN
        value: https://fg.nelna.lk
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_DOMAIN
        value: .nelna.lk
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 7d
      - key: APP_VERSION
        value: 1.0.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: APP_BUILD_ID
        sync: false
      - key: FILE_STORAGE_PATH
        sync: false

  - type: web
    name: nelna-fg-api-uat
    runtime: node
    plan: starter
    region: singapore
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @nelna/shared build && pnpm --filter @nelna/api prisma:generate && pnpm --filter @nelna/api build
    startCommand: pnpm --filter @nelna/api start:prod
    healthCheckPath: /health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: NELNA_DEPLOY_TIER
        value: uat
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_DOMAIN
        value: .nelna.lk
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 7d
      - key: APP_VERSION
        value: 1.0.0
      - key: API_CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: APP_BUILD_ID
        sync: false
