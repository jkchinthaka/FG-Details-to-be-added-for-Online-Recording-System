# Render Blueprint — Nelna FG Digital Recording System (API)
# Secrets are configured in the Render Dashboard — never commit real values here.
# Root directory must remain the monorepo root (workspace packages required).
# Node is pinned via .node-version / NODE_VERSION (do not run corepack enable —
# Render's native runtime filesystem is read-only and unlink of /usr/bin/pnpm fails).

services:
  - type: web
    name: nelna-fg-api
    runtime: node
    plan: starter
    region: singapore
    # Monorepo: do NOT set rootDir to apps/api
    buildCommand: export GIT_COMMIT_SHA="${RENDER_GIT_COMMIT:-$(git rev-parse HEAD)}" && export APP_BUILD_ID="$GIT_COMMIT_SHA" && export RELEASE_BUILT_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)" && pnpm install --frozen-lockfile --prod=false && node scripts/release/generate-release-manifest.js --service=nelna-fg-api --environment=production && pnpm --filter @nelna/shared build && pnpm --filter @nelna/api prisma:generate && pnpm --filter @nelna/api build
    startCommand: pnpm --filter @nelna/api start:prod
    healthCheckPath: /health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.16.0
      - key: NELNA_DEPLOY_TIER
        value: production
      - key: NELNA_COOKIE_MODE
        value: same_origin
      - key: COOKIE_SECURE
        value: "true"
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 7d
      - key: APP_VERSION
        value: 1.0.0
      - key: FRONTEND_PUBLIC_URL
        sync: false
      - key: API_CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: FILE_STORAGE_PATH
        sync: false
      # GIT_COMMIT_SHA / APP_BUILD_ID come from RENDER_GIT_COMMIT at build+runtime.
      # Do not set a static APP_BUILD_ID here — the Git SHA is authoritative.

  - type: web
    name: nelna-fg-api-uat
    runtime: node
    plan: starter
    region: singapore
    buildCommand: export GIT_COMMIT_SHA="${RENDER_GIT_COMMIT:-$(git rev-parse HEAD)}" && export APP_BUILD_ID="$GIT_COMMIT_SHA" && export RELEASE_BUILT_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)" && pnpm install --frozen-lockfile --prod=false && node scripts/release/generate-release-manifest.js --service=nelna-fg-api --environment=uat && pnpm --filter @nelna/shared build && pnpm --filter @nelna/api prisma:generate && pnpm --filter @nelna/api build
    startCommand: pnpm --filter @nelna/api start:prod
    healthCheckPath: /health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.16.0
      - key: NELNA_DEPLOY_TIER
        value: uat
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_DOMAIN
        value: .nelna.lk
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 7d
      - key: APP_VERSION
        value: 1.0.0
      - key: API_CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      # GIT_COMMIT_SHA / APP_BUILD_ID come from RENDER_GIT_COMMIT — do not hardcode.
