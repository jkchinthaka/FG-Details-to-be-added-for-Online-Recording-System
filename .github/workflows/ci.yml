name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format · Lint · Typecheck · Unit · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate release manifest from Git SHA
        run: |
          export GIT_COMMIT_SHA="${GITHUB_SHA}"
          export APP_BUILD_ID="${GITHUB_SHA}"
          node scripts/release/generate-release-manifest.js --service=nelna-fg-monorepo --environment=test
      - uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: reports/release/release-manifest.json
      - run: pnpm --filter @nelna/shared build
      - run: pnpm --filter @nelna/ui build
      - run: pnpm --filter @nelna/api prisma:generate
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Prisma validate
        working-directory: apps/api
        run: pnpm exec prisma validate
        env:
          DATABASE_URL: mongodb://127.0.0.1:27017/fg_online_test?replicaSet=rs0&directConnection=true
          GIT_COMMIT_SHA: ${{ github.sha }}
          APP_BUILD_ID: ${{ github.sha }}

  mongodb-integration:
    name: MongoDB integration
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mongodb://127.0.0.1:27017/fg_online_test?replicaSet=rs0&directConnection=true
      RUN_DB_INTEGRATION: "1"
      JWT_ACCESS_SECRET: test-only-access-secret-min-32-chars-xx
      JWT_REFRESH_SECRET: test-only-refresh-secret-min-32-chars-x
      COOKIE_SECURE: "false"
      SEED_ADMIN_EMAIL: admin@test.nelna.local
      SEED_ADMIN_PASSWORD: TestOnly!Admin123
      SEED_ADMIN_EMPLOYEE_CODE: TST-ADMIN
      SEED_OPERATOR_EMAIL: operator@test.nelna.local
      SEED_OPERATOR_PASSWORD: TestOnly!Operator123
      SEED_OPERATOR_EMPLOYEE_CODE: TST-OP
      SEED_SUPERVISOR_EMAIL: supervisor@test.nelna.local
      SEED_SUPERVISOR_PASSWORD: TestOnly!Sup12345
      SEED_SUPERVISOR_EMPLOYEE_CODE: TST-SUP
      SEED_QA_EMAIL: qa@test.nelna.local
      SEED_QA_PASSWORD: TestOnly!Qa12345
      SEED_QA_EMPLOYEE_CODE: TST-QA
    steps:
      - uses: actions/checkout@v4
      - name: Start MongoDB replica set (fg_online_test only)
        run: |
          docker run -d --rm --name mongo-test -p 27017:27017 mongo:7 --replSet rs0 --bind_ip_all
          for i in $(seq 1 40); do
            if docker exec mongo-test mongosh --quiet --eval 'try { rs.status().ok } catch (e) { rs.initiate({_id:"rs0",members:[{_id:0,host:"127.0.0.1:27017"}]}).ok }' | grep -q 1; then
              exit 0
            fi
            sleep 2
          done
          echo "MongoDB replica set failed to initialize" >&2
          exit 1
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @nelna/shared build
      - run: pnpm --filter @nelna/api prisma:generate
      - name: Push schema and seed test DB
        working-directory: apps/api
        run: |
          pnpm exec prisma db push
          node ../../scripts/database/ensure-sparse-current-version-index.js
          pnpm exec prisma db seed
      - name: Integration tests
        working-directory: apps/api
        run: pnpm test -- --runInBand --testPathPattern="db-integration|db-constraints"

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [quality]
    env:
      DATABASE_URL: mongodb://127.0.0.1:27017/fg_online_test?replicaSet=rs0&directConnection=true
      JWT_ACCESS_SECRET: test-only-access-secret-min-32-chars-xx
      JWT_REFRESH_SECRET: test-only-refresh-secret-min-32-chars-x
      COOKIE_SECURE: "false"
      API_CORS_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_API_URL: /api
      API_INTERNAL_URL: http://localhost:3001
      RUN_E2E: "1"
      E2E_BASE_URL: http://localhost:3000
      E2E_OPERATOR_USERNAME: tst-op
      E2E_OPERATOR_PASSWORD: TestOnly!Operator123
      SEED_ADMIN_EMAIL: admin@test.nelna.local
      SEED_ADMIN_PASSWORD: TestOnly!Admin123
      SEED_ADMIN_EMPLOYEE_CODE: TST-ADMIN
      SEED_OPERATOR_EMAIL: operator@test.nelna.local
      SEED_OPERATOR_PASSWORD: TestOnly!Operator123
      SEED_OPERATOR_EMPLOYEE_CODE: TST-OP
      SEED_SUPERVISOR_EMAIL: supervisor@test.nelna.local
      SEED_SUPERVISOR_PASSWORD: TestOnly!Sup12345
      SEED_SUPERVISOR_EMPLOYEE_CODE: TST-SUP
      SEED_QA_EMAIL: qa@test.nelna.local
      SEED_QA_PASSWORD: TestOnly!Qa12345
      SEED_QA_EMPLOYEE_CODE: TST-QA
      # Keep E2E_OPERATOR_EMAIL for backwards compatibility in docs only — unused by tests.
    steps:
      - uses: actions/checkout@v4
      - name: Start MongoDB replica set (fg_online_test only)
        run: |
          docker run -d --rm --name mongo-test -p 27017:27017 mongo:7 --replSet rs0 --bind_ip_all
          for i in $(seq 1 40); do
            if docker exec mongo-test mongosh --quiet --eval 'try { rs.status().ok } catch (e) { rs.initiate({_id:"rs0",members:[{_id:0,host:"127.0.0.1:27017"}]}).ok }' | grep -q 1; then
              exit 0
            fi
            sleep 2
          done
          echo "MongoDB replica set failed to initialize" >&2
          exit 1
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @nelna/shared build
      - run: pnpm --filter @nelna/ui build
      - run: pnpm --filter @nelna/api prisma:generate
      - name: Push schema and seed
        working-directory: apps/api
        run: |
          pnpm exec prisma db push
          node ../../scripts/database/ensure-sparse-current-version-index.js
          pnpm exec prisma db seed
      - run: pnpm --filter @nelna/api build
      - run: pnpm --filter @nelna/web build
      - name: Start API
        working-directory: apps/api
        run: pnpm start &
      - name: Start Web
        working-directory: apps/web
        run: pnpm start &
      - name: Wait for health
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:3001/health/live && curl -sf http://localhost:3000 >/dev/null && exit 0
            sleep 2
          done
          echo "Services failed to start" >&2
          exit 1
      - name: Install Playwright browser
        working-directory: apps/e2e
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E
        working-directory: apps/e2e
        run: pnpm test
        continue-on-error: true
