# MongoDB for local/CI integration tests — never use production fg_online here.
services:
  mongo-test:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: fg_online_test
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--eval",
          "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}).ok }",
        ]
      interval: 5s
      timeout: 10s
      retries: 10
