# Dedicated PostgreSQL for automated tests only — never use production or local prod dumps.
services:
  postgres-test:
    image: postgres:16-alpine
    container_name: nelna-fg-postgres-test
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: nelna_test
      POSTGRES_PASSWORD: nelna_test
      POSTGRES_DB: nelna_fg_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nelna_test -d nelna_fg_test"]
      interval: 3s
      timeout: 5s
      retries: 20
